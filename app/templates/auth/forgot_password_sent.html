<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Check Your Email — Freqy</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100" style="background-color:#f0f4f8;">
<div class="card text-center" style="width: 26rem;">
  <div class="card-body p-4">
    <div class="mb-3">
      <i class="bi bi-envelope-check" style="font-size:2.5rem; color:#0693e3;"></i>
    </div>
    <h5 class="card-title mb-2">Check your email</h5>
    <p class="text-secondary small mb-4">
      If that address is on file, a password reset link has been sent.
      The link expires in 24 hours.
    </p>
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary w-100">Back to Login</a>
    <div class="mt-3">
      <a href="{{ url_for('auth.forgot_password') }}" class="small text-secondary">Try a different address</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
