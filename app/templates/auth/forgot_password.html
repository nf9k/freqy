{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h4 class="mb-4">Password Recovery</h4>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label" for="email">Email address on file</label>
        <input id="email" name="email" type="email" class="form-control" autofocus required>
      </div>
      {% if hcaptcha_site_key %}
      <div class="h-captcha mb-3" data-sitekey="{{ hcaptcha_site_key }}"></div>
      {% endif %}
      <button type="submit" class="btn btn-primary">Send Reset Link</button>
      <a href="{{ url_for('auth.login') }}" class="btn btn-link text-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
{% if hcaptcha_site_key %}
<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
{% endif %}
{% endblock %}
